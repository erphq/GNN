name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check .

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - uses: dtolnay/rust-toolchain@stable
      - name: install runtime + dev deps (CPU torch)
        run: |
          python -m pip install --upgrade pip
          pip install --index-url https://download.pytorch.org/whl/cpu torch
          pip install \
            torch-geometric \
            numpy \
            pandas \
            scikit-learn \
            networkx \
            matplotlib \
            seaborn \
            plotly \
            pytest \
            maturin
      - name: build pm_fast (Rust hot-path extension)
        # Builds and installs the pm_fast wheel into the Python env.
        # Tests pick it up automatically via modules._fast; if this step
        # is removed the suite still passes via the Python fallback.
        working-directory: pm_fast
        run: maturin develop --release
      - name: pytest
        run: pytest -q

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: cargo fmt
        working-directory: pm_fast
        run: cargo fmt --check
      - name: cargo clippy
        working-directory: pm_fast
        run: cargo clippy --release -- -D warnings
